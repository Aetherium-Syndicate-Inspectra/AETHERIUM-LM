name: Security Checks

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit

      - name: Run dependency audit
        run: pip-audit
